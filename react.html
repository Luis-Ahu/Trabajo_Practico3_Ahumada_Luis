<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>React</title>
    <link rel="stylesheet" href="estilos.css">

    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone@7.28.0/babel.min.js"></script>
</head>

<body>

    <div id="root"></div>

    <script type="text/babel">
        function App() {

            const [personas, setPersonas] = React.useState([]);

            const [nombre, setNombre] = React.useState("");
            const [apellido, setApellido] = React.useState("");
            const [edad, setEdad] = React.useState("");
            const [altura, setAltura] = React.useState("");
            const [peso, setPeso] = React.useState("");

            function agregarPersona(evento) {
                evento.preventDefault();

                if (edad < 0 || edad > 120) {
                    alert("Edad inválida");
                    return;
                }
                if (altura <= 0 || altura > 2.5) {
                    alert("Altura inválida");
                    return;
                }
                if (peso <= 0 || peso > 300) {
                    alert("Peso inválido");
                    return;
                }

                const imc = (peso / (altura * altura)).toFixed(2);

                const nuevaPersona = {
                    nombre, apellido, edad, altura, peso, imc
                };

                setPersonas([...personas, nuevaPersona]);

                setNombre("");
                setApellido("");
                setEdad("");
                setAltura("");
                setPeso("");
            }

        function eliminarPersona(indice) {

            const nuevasPersonas = personas.filter(
                (_, i) => i !== indice
            );
            setPersonas(nuevasPersonas);
        }

        return (
            <div>
                <h1>Registro de Personas</h1>
                    <form onSubmit={agregarPersona}>
                        <input type="text" placeholder="Nombre" value={nombre}
                            onChange={(e) => setNombre(e.target.value)} required />

                        <input type="text" placeholder="Apellido" value={apellido}
                            onChange={(e) => setApellido(e.target.value)} required />

                        <input type="number" placeholder="Edad" value={edad}
                            onChange={(e) => setEdad(e.target.value)} required />

                        <input type="number" placeholder="Altura" value={altura}
                            onChange={(e) => setAltura(e.target.value)} required />

                        <input type="number" placeholder="Peso" value={peso}
                            onChange={(e) => setPeso(e.target.value)} required />

                        <button type="submit">Agregar</button>
                    </form>

                <table border="1">
                    <thead>
                        <tr>
                            <th>Nombre</th>
                            <th>Apellido</th>
                            <th>Edad</th>
                            <th>Altura</th>
                            <th>Peso</th>
                            <th>IMC</th>
                            <th>Acción</th>
                        </tr>
                    </thead>

                    <tbody>

                        {personas.map((persona, indice) => (

                            <tr key={indice}>
                                <td>{persona.nombre}</td>
                                <td>{persona.apellido}</td>
                                <td>{persona.edad}</td>
                                <td>{persona.altura}</td>
                                <td>{persona.peso}</td>
                                <td>{persona.imc}</td>

                                <td>
                                    <button
                                        onClick={() =>
                                            eliminarPersona(indice)
                                        }
                                    >
                                        Eliminar
                                    </button>
                                </td>
                            </tr>
                        ))}
                    </tbody>
                </table>
            </div>
        );
    }

        const root = ReactDOM.createRoot(
            document.getElementById("root")
        );

        root.render(<App />);

    </script>

    <a href="index.html">Volver a la pagina principal</a>
</body>
</html>
