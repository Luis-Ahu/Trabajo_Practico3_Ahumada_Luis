<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Personas</title>
    <link rel="stylesheet" href="estilos.css">
</head>
<body>
    <h1>Registro de Personas</h1>
<div class="centrar CajaGris">
    <form id="formulario">

        <input type="text" id="nombre" placeholder="Nombre" required>

        <input type="text" id="apellido" placeholder="Apellido" required>

        <input type="number" placeholder="Edad" id="edad" min="1" max="120" required>

        <input type="number" placeholder="Altura (m)" id="altura" min="0.30" max="2.5" step="0.01" required>

        <input type="number" placeholder="Peso (kg)" id="peso" min="1" max="300" step="0.1" required>

        <button type="submit">Agregar</button>

    </form>
</div>
    <br>
<div class="centrar">
    <table>

        <thead>
            <tr>
                <th>Nombre</th>
                <th>Apellido</th>
                <th>Edad</th>
                <th>Altura</th>
                <th>Peso</th>
                <th>IMC</th>
                <th>Acción</th>
            </tr>
        </thead>

        <tbody id="tablaPersonas"></tbody>

    </table>
</div>

    <div class="centrar CajaGris">
        <a href="index.html">Volver a la pagina principal</a>
    </div>

    <script src="personas.js"></script>

</body>
</body>
</html>
